name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content version.json | ConvertFrom-Json).version
          "app_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build executable
        run: pyinstaller --clean PulseFinance.spec

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ steps.version.outputs.app_version }}" "PulseFinance.iss"

      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path dist/PulseFinance.exe -DestinationPath "release/PulseFinance-Windows-${{ steps.version.outputs.app_version }}.zip" -Force
          Copy-Item "release/PulseFinance-Windows-${{ steps.version.outputs.app_version }}.zip" "release/PulseFinance-Windows.zip" -Force
          Copy-Item "release/PulseFinance-Installer-${{ steps.version.outputs.app_version }}.exe" "release/PulseFinance-Installer.exe" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PulseFinance-Windows
          path: |
            dist/PulseFinance.exe
            release/PulseFinance-Installer-${{ steps.version.outputs.app_version }}.exe
            release/PulseFinance-Installer.exe
            release/PulseFinance-Windows-${{ steps.version.outputs.app_version }}.zip
            release/PulseFinance-Windows.zip
